<style>
  :root{
    --bg:#050816; --card:#141627; --card2:#171a2e; --ink:#eef1ff; --dim:#9aa3c7;
    --line:#262a45; --a1:#8B5CF6; --a2:#22D3EE; --kalo:#0EA5A4;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(101,112,196,.20), transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 110%, rgba(40,60,120,.16), transparent 60%), var(--bg);
    background-attachment:fixed;
    color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    min-height:100vh; position:relative; display:flex; justify-content:center; padding:34px 18px calc(48px + env(safe-area-inset-bottom))}
  #stars{position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none}
  .page{width:100%; max-width:460px; display:flex; flex-direction:column; align-items:center; position:relative; z-index:1}
  .avatar{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;font-size:50px;overflow:hidden;
    background:linear-gradient(145deg,var(--a1),var(--a2));box-shadow:0 0 0 4px #ffffff10,0 14px 40px #8b5cf655;margin-bottom:14px}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .name{font-size:25px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
  .name .v{color:var(--a2);font-size:20px}
  .handle{color:var(--dim);font-size:15px;margin-top:2px}
  .bio{color:#c7cdf0;font-size:15px;text-align:center;margin:12px 6px 22px;line-height:1.5}
  .seg{align-self:flex-start;color:var(--dim);font-size:12.5px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;margin:18px 4px 9px}
  .seg:first-of-type{margin-top:2px}
  .seg .note{display:block;text-transform:none;letter-spacing:0;font-weight:500;color:#8089ad;font-size:12px;margin-top:3px}
  /* simple link buttons (socials / contact) */
  a.btn{width:100%;display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:11px;
    transition:transform .12s ease,background .12s ease,border-color .12s ease;position:relative;touch-action:manipulation}
  a.btn:hover{transform:translateY(-2px);background:var(--card2);border-color:#3a3f6b}
  a.btn:active{transform:scale(.985)}
  a.btn.primary{border-color:var(--a1);box-shadow:0 0 0 1px #8b5cf655, 0 10px 34px #8b5cf526}
  a.btn:focus-visible,a.pcard:focus-visible{outline:none;box-shadow:0 0 0 3px var(--a2),0 0 0 6px #22d3ee44}
  .ic{flex:0 0 44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:23px;
    background:#ffffff0d;border:1px solid var(--line)}
  .tx{display:flex;flex-direction:column;min-width:0}
  .lbl{font-size:16px;font-weight:700;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
  .sub{font-size:12.5px;color:var(--dim);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
  .chev{margin-left:auto;color:var(--dim);font-size:18px;flex:0 0 auto}
  .tag{font-size:10.5px;font-weight:800;letter-spacing:.06em;color:#0a0b12;
    background:var(--a2);border-radius:999px;padding:3px 9px;flex:0 0 auto}
  .btn .tag{margin-left:auto}
  /* affiliate PRODUCT CARDS — bigger, image + why + price + clear CTA */
  a.pcard{width:100%;display:flex;gap:14px;text-decoration:none;color:var(--ink);
    background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;
    padding:14px;margin-bottom:12px;position:relative;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease;touch-action:manipulation}
  a.pcard:hover{transform:translateY(-2px);border-color:#3a3f6b}
  a.pcard.star{border-color:var(--a1);box-shadow:0 0 0 1px #8b5cf655,0 12px 36px #8b5cf522}
  .pimg{flex:0 0 76px;height:76px;border-radius:14px;display:grid;place-items:center;font-size:38px;overflow:hidden;
    background:radial-gradient(120% 120% at 30% 20%,#2a2f55,#11132a);border:1px solid var(--line)}
  .pimg img{width:100%;height:100%;object-fit:cover}
  .pbody{display:flex;flex-direction:column;min-width:0;flex:1;gap:3px}
  .ptop{display:flex;align-items:center;gap:8px}
  .pname{font-size:16px;font-weight:800;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .pwhy{font-size:13px;color:var(--dim);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .prow{display:flex;align-items:center;gap:10px;margin-top:6px}
  .price{font-size:13px;font-weight:800;color:#34D399}
  .pcta{margin-left:auto;font-size:13px;font-weight:800;color:#0a0b12;background:var(--a2);border-radius:10px;padding:7px 14px}
  .pill{font-size:9.5px;font-weight:800;letter-spacing:.05em;border-radius:999px;padding:2px 7px}
  .pill.aff{color:#0a0b12;background:var(--a2)}
  .pill.best{color:#0a0b12;background:#FBBF24}
  .pill.mine{color:#0a0b12;background:#c9b8ff}
  a.pcard.mine{border-color:#c9b8ff}
  a.pcard.mine.star{box-shadow:0 0 0 1px #c9b8ff55,0 12px 36px #c9b8ff22}
  a.pcard.mine .pcta{background:#c9b8ff}
  a.pcard.mine .pwhy{-webkit-line-clamp:3}
  /* partner / sponsored featured card (Kalodata campaign) */
  a.pcard.kalo{border-color:var(--kalo)}
  a.pcard.kalo.star{box-shadow:0 0 0 1px #0ea5a455,0 12px 36px #0ea5a42a}
  a.pcard.kalo .pimg{background:radial-gradient(120% 120% at 30% 20%,#0f3f3b,#0a1f1e)}
  a.pcard.kalo .pcta{background:var(--kalo);color:#eafffb}
  a.pcard.kalo .pwhy{-webkit-line-clamp:3}
  .pill.partner{color:#04201c;background:var(--kalo)}
  .kcode{align-self:flex-start;margin-top:4px;font-size:12.5px;font-weight:800;letter-spacing:.03em;
    color:#04201c;background:#5eead4;border-radius:9px;padding:6px 11px;box-shadow:0 0 18px #5eead455}
  .knote{align-self:flex-start;margin-top:8px;font-size:12px;font-weight:600;color:#5eead4}
  .disc{font-size:11.5px;color:#cfd5ff;text-align:center;line-height:1.55;margin:20px 8px 8px;
    border-top:1px solid var(--line);padding-top:16px;width:100%}
  .foot{font-size:11px;color:#cfd5ff;margin-top:10px}
  .toast{position:fixed;left:50%;bottom:38px;transform:translateX(-50%) translateY(24px);z-index:99;
    max-width:88%;padding:14px 22px;border-radius:14px;font-size:15px;font-weight:600;color:#04201c;
    background:var(--a2);box-shadow:0 12px 40px rgba(0,0,0,.45),0 0 30px rgba(34,211,238,.4);
    opacity:0;pointer-events:none;transition:opacity .3s, transform .35s cubic-bezier(.22,1,.36,1)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ===== Cosmic background — ported from sleepy-soundscape (BACKGROUND ONLY) ===== */
  .cosmic-scene{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:.66}
  .cosmic-parallax{position:absolute;inset:0;overflow:hidden}
  .cos-obj{position:absolute;will-change:transform}
  .cos-obj svg{width:100%;height:auto;display:block}
  .cosmic-comets{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  @keyframes cos-float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
  .cos-float{animation:cos-float 7s ease-in-out infinite}
  @keyframes cos-drift{0%{transform:translateX(-14px)}100%{transform:translateX(14px)}}
  .cos-drift{animation:cos-drift 15s ease-in-out infinite alternate}
  @keyframes cos-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .cos-spin{animation:cos-spin 44s linear infinite}
  @keyframes cos-sway{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(1.5deg)}}
  .cos-sway{animation:cos-sway 11s ease-in-out infinite}
  @keyframes cos-comet{0%{transform:translate3d(0,0,0) rotate(-20deg);opacity:0}5%{opacity:1}24%{opacity:.9}40%{opacity:0}100%{transform:translate3d(-130vw,72vh,0) rotate(-20deg);opacity:0}}
  .cos-comet{animation-name:cos-comet;animation-timing-function:linear;animation-iteration-count:infinite}
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
    #stars,.cosmic-comets{display:none}
  }
</style>
</head>

/* ─────────────────────────────────────────────────────────────

}

/* ===== Starfield (twinkle + cursor trail) — ported from sleepy-soundscape StarfieldCanvas ===== */
(function(){
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const canvas=document.getElementById("stars"), ctx=canvas.getContext("2d");
  let w=0,h=0,dpr=1; const stars=[], trail=[];
  function resize(){ dpr=Math.min(window.devicePixelRatio||1,2); w=innerWidth; h=innerHeight;
    canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
    canvas.style.width=w+"px"; canvas.style.height=h+"px"; ctx.setTransform(dpr,0,0,dpr,0,0);
    stars.length=0; const count=Math.min(260,Math.floor(w*h/7000));
    for(let i=0;i<count;i++) stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.3+0.2,
      baseA:Math.random()*0.6+0.2,phase:Math.random()*6.2832,speed:Math.random()*0.5+0.15});
  }
  resize(); addEventListener("resize",resize);
  function onMove(e){ trail.push({x:e.clientX,y:e.clientY,life:1}); if(trail.length>70) trail.shift(); }
  addEventListener("pointermove",onMove,{passive:true}); addEventListener("pointerdown",onMove,{passive:true});
  let t=0,last=performance.now();
  function frame(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; t+=dt;
    ctx.clearRect(0,0,w,h);
    for(const st of stars){ const tw=0.5+0.5*Math.sin(t*st.speed*2+st.phase); const a=st.baseA*(0.35+0.65*tw);
      ctx.globalAlpha=a; ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,6.2832); ctx.fill();
      if(st.r>0.85){ ctx.globalAlpha=a*0.25; ctx.beginPath(); ctx.arc(st.x,st.y,st.r*3.2,0,6.2832); ctx.fill(); } }
    ctx.globalAlpha=1;
    for(let i=0;i<trail.length;i++){ const p=trail[i]; p.life-=dt*1.1; if(p.life<=0) continue; const a=p.life*0.5;
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,22); g.addColorStop(0,"rgba(201,184,255,"+a+")");
      g.addColorStop(0.5,"rgba(160,170,255,"+(a*0.4)+")"); g.addColorStop(1,"rgba(201,184,255,0)");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,22,0,6.2832); ctx.fill(); }
    while(trail.length && trail[0].life<=0) trail.shift();
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
})();

/* ===== Cosmic parallax — shift each mascot by its distance from viewport centre × depth ===== */
(function(){
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const layer=document.querySelector(".cosmic-parallax"); if(!layer) return;
  const els=Array.from(layer.querySelectorAll("[data-depth]"));
  let items=[];
  const measure=()=>{ items=els.map(el=>({el,depth:+el.dataset.depth||0,center:el.offsetTop+el.offsetHeight/2})); };
  let ticking=false;
  const update=()=>{ const mid=scrollY+innerHeight/2; for(const it of items){ const d=mid-it.center;
    it.el.style.transform="translate3d(0,"+(d*it.depth).toFixed(1)+"px,0)"; } ticking=false; };
  const onScroll=()=>{ if(!ticking){ ticking=true; requestAnimationFrame(update); } };
  measure(); update();
  addEventListener("scroll",onScroll,{passive:true});
  addEventListener("resize",()=>{ measure(); update(); });
})();
