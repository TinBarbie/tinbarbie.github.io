<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tên kênh của bạn — Links</title>
<meta name="description" content="Tất cả link của kênh — TikTok, YouTube, tool & đồ nghề mình dùng.">
<!-- Open Graph (hiện thumbnail đẹp khi share link) -->
<meta property="og:title" content="Tên kênh của bạn — Links">
<meta property="og:description" content="Mỗi ngày 1 repo GitHub hay ho — tools mình dùng ở đây.">
<meta property="og:type" content="website">
<style>
  :root{
    --bg:#0a0b12; --card:#141627; --card2:#171a2e; --ink:#eef1ff; --dim:#9aa3c7;
    --line:#262a45; --a1:#8B5CF6; --a2:#22D3EE;
}
.toast{position:fixed;left:50%;bottom:38px;transform:translateX(-50%) translateY(24px);z-index:99;
  max-width:88%;padding:14px 22px;border-radius:14px;font-size:15px;font-weight:600;color:#04201c;
  background:var(--a2);box-shadow:0 12px 40px rgba(0,0,0,.45),0 0 30px rgba(34,211,238,.4);
  opacity:0;pointer-events:none;transition:opacity .3s, transform .35s cubic-bezier(.22,1,.36,1);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
:root{
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:
      radial-gradient(120% 60% at 50% -8%, #1b1640 0%, transparent 55%),
      radial-gradient(90% 50% at 50% 108%, #0a2a33 0%, transparent 55%), var(--bg);
    color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    min-height:100vh; display:flex; justify-content:center; padding:34px 18px calc(48px + env(safe-area-inset-bottom))}
  #stars{position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none}
  .page{width:100%; max-width:460px; display:flex; flex-direction:column; align-items:center; position:relative; z-index:1}
  .avatar{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;font-size:50px;overflow:hidden;
    background:linear-gradient(145deg,var(--a1),var(--a2));box-shadow:0 0 0 4px #ffffff10,0 14px 40px #8b5cf655;margin-bottom:14px}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .name{font-size:25px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
  .name .v{color:var(--a2);font-size:20px}
  .handle{color:var(--dim);font-size:15px;margin-top:2px}
  .bio{color:#c7cdf0;font-size:15px;text-align:center;margin:12px 6px 22px;line-height:1.5}
  .seg{align-self:flex-start;color:var(--dim);font-size:12.5px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;margin:18px 4px 9px}
  .seg:first-of-type{margin-top:2px}
  a.btn{width:100%;display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:11px;
    transition:transform .12s ease,background .12s ease,border-color .12s ease;position:relative}
  a.btn:hover{transform:translateY(-2px);background:var(--card2);border-color:#3a3f6b}
  a.btn:active{transform:scale(.985)}
  a.btn.primary{border-color:var(--a1);box-shadow:0 0 0 1px #8b5cf655, 0 10px 34px #8b5cf526}
  .ic{flex:0 0 44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:23px;
    background:#ffffff0d;border:1px solid var(--line)}
  .tx{display:flex;flex-direction:column;min-width:0}
  .lbl{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub{font-size:12.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chev{margin-left:auto;color:var(--dim);font-size:18px;flex:0 0 auto}
  .tag{margin-left:auto;font-size:10.5px;font-weight:800;letter-spacing:.06em;color:#0a0b12;
    background:var(--a2);border-radius:999px;padding:3px 9px;flex:0 0 auto}
  .disc{font-size:11.5px;color:#ffffff;text-align:center;line-height:1.55;margin:20px 8px 8px;
    border-top:1px solid var(--line);padding-top:16px;width:100%}
  .foot{font-size:11px;color:#ffffff;margin-top:10px}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="toast" class="toast"></div>
<div class="page">
  <div class="avatar" id="av">🦌</div>
  <div class="name" id="nm">Tên kênh của bạn <span class="v">✔</span></div>
  <div class="handle" id="hd">@yourhandle</div>
  <div class="bio" id="bio"></div>
  <div id="links" style="width:100%"></div>
  <div class="disc">
    Một số link bên trên là <b>affiliate</b> — nếu bạn mua/đăng ký qua đó, mình có thể nhận một ít hoa hồng,
    <b>không phát sinh thêm phí</b> cho bạn. Cảm ơn đã ủng hộ kênh 🙏
  </div>
  <div class="foot">Chúc bạn một ngày thành công và tràn đầy năng lượng ✨</div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────
   CHỈNH Ở ĐÂY — chỉ cần sửa khối này, không động phần dưới.
   • PROFILE: avatar (emoji) / name / handle / bio
   • LINKS: mỗi { } là 1 nút. Thay "url" bằng link THẬT.
       section : tiêu đề nhóm (bỏ trống nếu cùng nhóm nút trên)
       tag     : nhãn nhỏ phải (vd "AFFILIATE"); bỏ đi nếu không cần
       primary : true → nút nổi bật (viền tím)
   • Muốn avatar là ẢNH thật: đặt file logo.png cạnh index.html rồi
     đổi avatar:"🦌" → avatar:'<img src="logo.png" alt="">'
   ───────────────────────────────────────────────────────────── */
const PROFILE = {
  avatar: '<img src="avatar.png" alt="">',
  name:   "60s Công Nghệ Cùng Tin",
  handle: "@60s.cong.nghe.cung.tin",
  bio:    "Mỗi ngày 1 repo GitHub hay ho 🔥 — cho dev · gamer · người học AI. Tool & đồ nghề mình dùng ở dưới 👇"
};
const LINKS = [
  { section:"Theo dõi mình", icon:"🎵", label:"TikTok", sub:"@60s.cong.nghe.cung.tin", url:"https://www.tiktok.com/@60s.cong.nghe.cung.tin", primary:true },
  { icon:"📘", label:"Facebook", sub:"theo dõi thêm trên Facebook", url:"https://www.facebook.com/profile.php?id=61581490000312" },
  { icon:"📸", label:"Instagram", sub:"@60s_cong_nghe_cung_tin", url:"https://www.instagram.com/60s_cong_nghe_cung_tin/" },

  { section:"Tool & sách mình dùng", icon:"🎙️", label:"ElevenLabs — giọng AI mình xài", sub:"tạo voiceover chất", url:"https://try.elevenlabs.io/61mv3aj67c86", tag:"AFFILIATE" },
  { icon:"📚", label:"Sách AI mình gối đầu", sub:"cuốn mình đọc đi đọc lại", url:"https://vt.tiktok.com/ZS96JHPu2jLJy-FKXZC/", tag:"AFFILIATE" },

  { section:"Đồ nghề", icon:"🖱️", label:"Chuột mình dùng", sub:"daily driver", url:"https://vt.tiktok.com/ZS96JHG4LNHfS-Rej69/", tag:"AFFILIATE" },
  { icon:"⌨️", label:"Bàn phím mình gõ", sub:"gõ cả ngày không mỏi", url:"https://vt.tiktok.com/ZS96J9mc2b84S-pryON/", tag:"AFFILIATE" },
  { icon:"🖥️", label:"Màn hình nhìn mỗi ngày", sub:"dựng video · code", url:"https://vt.tiktok.com/ZS96J9SM44CCS-hS6W2/", tag:"AFFILIATE" },

  { section:"Hợp tác", icon:"🤝", label:"Hợp tác / tài trợ", sub:"liên hệ làm video", url:"mailto:baotin22071998@gmail.com" },
];

const slug = s => s.toLowerCase().normalize("NFD").replace(/[̀-ͯđ]/g, m => m==="đ"?"d":"")
  .replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const wrap = document.getElementById("links");
let html = "";
LINKS.forEach(l=>{
  if(l.section) html += `<div class="seg">${l.section}</div>`;
  const right = l.tag ? `<span class="tag">${l.tag}</span>` : `<span class="chev">›</span>`;
  const sub = l.sub ? `<span class="sub">${l.sub}</span>` : "";
  const track = slug(l.label) + (l.tag==="AFFILIATE" ? "-aff" : "");
  const isMail = l.url.startsWith("mailto:");
  const email = isMail ? l.url.slice(7) : "";
  // mailto fails in in-app browsers (IG/TikTok webview) → copy email + toast instead of navigating
  const attrs = isMail ? `data-email="${email}"` : `target="_blank" rel="noopener nofollow"`;
  html += `<a class="btn ${l.primary?'primary':''}" href="${l.url}" ${attrs} data-track="${track}">
    <span class="ic">${l.icon}</span><span class="tx"><span class="lbl">${l.label}</span>${sub}</span>${right}</a>`;
});
wrap.innerHTML = html;

/* ── Đếm click từng tab (gửi event lên GoatCounter; no-op nếu chưa cấu hình) ── */
document.addEventListener("click", e => {
  const a = e.target.closest("a.btn[data-track]");
  if(!a) return;
  const name = a.getAttribute("data-track");
  try {
    if (window.goatcounter && window.goatcounter.count) {
      window.goatcounter.count({ path: "click/" + name, title: a.querySelector(".lbl")?.textContent || name, event: true });
    }
  } catch(_) {}
  // contact link: mailto breaks in in-app browsers → copy the email + toast instead
  const email = a.getAttribute("data-email");
  if (email) {
    e.preventDefault();
    const ok = () => showToast("📋 Đã sao chép email · dán vào Mail nhé");
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(email).then(ok).catch(() => fallbackCopy(email, ok));
    } else { fallbackCopy(email, ok); }
  }
});
function fallbackCopy(text, done){
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.setAttribute("readonly",""); ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, text.length);
    document.execCommand("copy"); document.body.removeChild(ta); done();
  } catch(_) { showToast("✉️ " + text); }
}
let _toastT;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("on");
  clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.remove("on"), 2600);
}
document.getElementById("av").innerHTML = PROFILE.avatar;
document.getElementById("nm").childNodes[0].nodeValue = PROFILE.name + " ";
document.getElementById("hd").textContent = PROFILE.handle;
document.getElementById("bio").textContent = PROFILE.bio;
document.title = PROFILE.name + " — Links";

/* ── nền sao bay (drifting glowing particles, tông tím/cyan như DeckBg video) ── */
(function(){
  const c=document.getElementById("stars"), x=c.getContext("2d");
  const COLORS=["#ffffff","#ffffff","#ffffff","#8B5CF6","#22D3EE"];
  let w,h,dpr,ps=[];
  function resize(){
    dpr=Math.min(2,window.devicePixelRatio||1);
    w=c.width=innerWidth*dpr; h=c.height=innerHeight*dpr;
    c.style.width=innerWidth+"px"; c.style.height=innerHeight+"px";
    const n=Math.min(150,Math.round(innerWidth*innerHeight/6000));
    ps=[];
    for(let i=0;i<n;i++) ps.push({
      x:Math.random()*w, y:Math.random()*h, r:(Math.random()*1.6+0.5)*dpr,
      vx:(Math.random()-0.5)*0.12*dpr, vy:(-Math.random()*0.18-0.04)*dpr,
      a:Math.random()*0.6+0.2, tw:Math.random()*6.28, col:COLORS[(Math.random()*COLORS.length)|0]
    });
  }
  function frame(){
    x.clearRect(0,0,w,h);
    for(const p of ps){
      p.x+=p.vx; p.y+=p.vy; p.tw+=0.02;
      if(p.y<-12)p.y=h+12; if(p.x<-12)p.x=w+12; if(p.x>w+12)p.x=-12;
      x.beginPath(); x.arc(p.x,p.y,p.r,0,6.2832);
      x.fillStyle=p.col; x.globalAlpha=p.a*(0.55+0.45*Math.sin(p.tw));
      x.shadowBlur=6*dpr; x.shadowColor=p.col; x.fill();
    }
    x.globalAlpha=1; x.shadowBlur=0;
    requestAnimationFrame(frame);
  }
  addEventListener("resize",resize); resize(); requestAnimationFrame(frame);
})();
</script>

<!-- ANALYTICS: đếm lượt click từng tab (GoatCounter, miễn phí).
     BƯỚC DUY NHẤT ANH CẦN LÀM: đăng ký goatcounter.com → đổi YOURCODE bên dưới thành mã site của anh.
     Dashboard sẽ hiện mỗi tab dưới dạng "click/<tên-tab>" (tab affiliate có hậu tố -aff). -->
<script data-goatcounter="https://60s-congnghe.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
